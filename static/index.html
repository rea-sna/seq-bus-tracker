<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SEQ Bus Tracker</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="container">

    <header>
      <div class="tag">South East Queensland</div>
      <h1>SEQ Bus<br><span>Tracker</span></h1>
      <p class="subtitle">Real-time arrivals powered by Translink GTFS-RT</p>
    </header>

    <div id="favorites-section" style="display:none;margin-bottom:16px;">
      <div class="section-label">Favorites</div>
      <div id="favorites-list"></div>
    </div>

    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input id="search-input" type="text" placeholder="Search for a bus stop…" autocomplete="off" />
      <button id="gps-btn" onclick="findNearbyStops()" title="Find nearby stops">
        <span id="gps-icon">◎</span>
      </button>
    </div>
    <div id="stop-list"></div>

    <div class="error-msg" id="error-msg"></div>

    <div id="stop-header">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;">
        <div>
          <div class="stop-header-name" id="stop-header-name">—</div>
          <div class="stop-header-meta">
            <span id="stop-header-id">—</span>
            <span id="stop-header-coords">—</span>
          </div>
        </div>
        <div style="display:flex;gap:8px;align-items:center;flex-shrink:0;">
          <button class="fav-btn" id="fav-btn" onclick="toggleFavorite()" title="Add to favorites">☆</button>
          <button class="refresh-btn" id="refresh-btn" onclick="refreshArrivals()">↺ Refresh</button>
          <button class="toggle-btn active" id="auto-refresh-toggle" onclick="toggleAutoRefresh()">
            <span class="toggle-track"><span class="toggle-thumb"></span></span>
            <span class="toggle-label">Auto</span>
          </button>
        </div>
      </div>
    </div>

    <div class="refresh-bar" id="refresh-bar">
      <div class="refresh-bar-fill" id="refresh-bar-fill"></div>
    </div>

    <div id="main-panel">
      <div id="arrivals-col">
        <div class="section-label">Next buses</div>
        <div id="arrivals-list"></div>
      </div>
      <div id="map-col">
        <div id="map-col-inner">
          <div class="section-label">Route map</div>
          <div id="map-wrap">
            <div id="map"></div>
            <div class="map-hint" id="map-hint">← Select a bus to show its route</div>
          </div>
          <div id="stop-timeline" style="display:none;margin-top:12px;"></div>
        </div>
      </div>
    </div>

    <footer>
      <span class="footer-text">Data: Translink Open Data (CC-BY) · Map: © OpenStreetMap contributors</span>
      <span class="footer-text"><a href="https://github.com/rea-sna/seq-bus-tracker" target="_blank">GitHub</a></span>
      <span class="live-dot">LIVE</span>
    </footer>

  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>

</html>
